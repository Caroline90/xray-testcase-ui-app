<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Xray Test Builder</title>

    <style>
        :root {
            --primary:#4CAF50;
            --secondary:#2196F3;
            --danger:#f44336;
            --bg:#f5f7fa;
            --text:#1f2937;
            --muted:#6b7280;
            --line:#e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Arial;
            background: var(--bg);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1100px; margin:auto; }

        .card {
            background:white;
            padding:20px;
            border-radius:12px;
            box-shadow:0 6px 18px rgba(0,0,0,0.08);
            margin-bottom:20px;
        }

        .editor-head {
            display:flex;
            align-items:center;
            justify-content:space-between;
            margin-bottom:8px;
        }

        .editor-subtitle {
            color:var(--muted);
            font-size:14px;
            margin:0 0 14px;
        }

        input, select, textarea {
            width:100%;
            padding:11px 12px;
            margin-bottom:10px;
            border-radius:8px;
            border:1px solid #ddd;
            font-size:15px;
            box-sizing:border-box;
        }

        input:focus, select:focus, textarea:focus {
            border-color:#2196F3;
            box-shadow:0 0 0 3px rgba(33,150,243,.15);
            outline:none;
        }

        button {
            padding:8px 12px;
            border:none;
            border-radius:8px;
            color:white;
            cursor:pointer;
        }

        .primary { background:#4CAF50; }
        .secondary { background:#2196F3; }
        .danger { background:#f44336; }

        .primary:hover { background:#3f9743; }
        .secondary:hover { background:#1f82d3; }
        .danger:hover { background:#df3a2f; }

        .table-wrap {
            border:1px solid var(--line);
            border-radius:10px;
            overflow:hidden;
            background:#fff;
            margin-top:10px;
        }

        table {
            width:100%;
            border-collapse:collapse;
        }

        thead {
            background:#f8fafc;
        }

        th {
            color:var(--text);
            font-size:13px;
            text-transform:uppercase;
            letter-spacing:.04em;
            font-weight:700;
            padding:12px 10px;
            border-bottom:1px solid var(--line);
        }

        td {
            padding:8px 10px;
            border-bottom:1px solid #f0f2f5;
            vertical-align:middle;
        }

        #steps tbody tr:last-child td {
            border-bottom:none;
        }

        #steps tbody tr:hover {
            background:#fafcff;
        }

        .step-number {
            text-align:center;
            font-weight:700;
            color:#111827;
            width:42px;
        }

        .step-delete {
            text-align:center;
            width:70px;
        }

        #steps tbody input {
            margin-bottom:0;
            background:#fff;
        }

        .editor-actions {
            display:flex;
            gap:8px;
            margin-top:14px;
        }

        .list-item {
            display:flex;
            justify-content:space-between;
            padding:10px;
            border-bottom:1px solid #eee;
        }

        #toast {
            position:fixed;
            bottom:20px;
            right:20px;
            background:#333;
            color:white;
            padding:10px;
            border-radius:6px;
            opacity:0;
        }
        #toast.show { opacity:1; }

        .error { color:red; }

        .preview-box {
            border:1px solid #ddd;
            padding:10px;
            margin-bottom:10px;
            border-radius:8px;
        }

        @media (max-width: 820px) {
            .container { padding: 0 4px; }
            .card { padding:14px; }
            th:nth-child(3), td:nth-child(3) { display:none; }
            .editor-actions { flex-wrap:wrap; }
        }
    </style>
</head>

<body>

<div class="container">

    <!-- IMPORT -->
    <div class="card">
        <h2>📂 Import CSV</h2>
        <input type="file" id="file">
        <button class="secondary" onclick="importCsv()">Preview Import</button>
    </div>

    <!-- ERRORS -->
    <div class="card">
        <h3>⚠️ Errors</h3>
        <ul id="errors"></ul>
    </div>

    <!-- PREVIEW -->
    <div class="card">
        <h3>👀 Preview</h3>
        <div id="preview"></div>
    </div>

    <!-- EDITOR -->
    <div class="card">
        <div class="editor-head">
            <h2>✏️ Editor</h2>
        </div>
        <p class="editor-subtitle">Clean, compact steps grid with better readability.</p>

        <input id="id" type="hidden">
        <input id="summary" placeholder="Summary">
        <textarea id="description" rows="3" placeholder="Description"></textarea>
        <input id="pre" placeholder="Preconditions">

        <select id="testType">
            <option>Manual</option>
            <option>Automated</option>
        </select>

        <input id="component" placeholder="Components">
        <input id="affectedVersion" placeholder="Affects Version/s">
        <input id="fixVersion" placeholder="Fix Version/s">
        <input id="labels" placeholder="Labels (comma-separated)">
        <input id="executeIn" placeholder="Execute In (e.g., v1, Regression)">

        <div class="table-wrap">
            <table id="steps">
                <thead>
                <tr>
                    <th>#</th><th>Action</th><th>Data</th><th>Expected</th><th></th>
                </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="editor-actions">
            <button class="primary" onclick="addRow()">+ Step</button>
            <button class="secondary" onclick="save()">💾 Save</button>
            <button class="secondary" onclick="downloadCsv()">⬇️ Download CSV</button>
        </div>

    </div>

    <!-- LIST -->
    <div class="card">
        <h2>📦 Saved</h2>
        <div id="list"></div>
    </div>

</div>

<div id="toast"></div>

<script>
    function toast(msg){
        const t=document.getElementById('toast');
        t.innerText=msg;
        t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),2000);
    }

    function addRow(a='',d='',e=''){
        const tr=document.createElement('tr');
        tr.innerHTML=`
    <td class="step-number"></td>
    <td><input value="${a}"></td>
    <td><input value="${d}"></td>
    <td><input value="${e}"></td>
    <td class="step-delete"><button class="danger" onclick="removeRow(this)">✕</button></td>`;
        document.querySelector('#steps tbody').appendChild(tr);
        update();
    }

    function removeRow(btn){
        btn.closest('tr').remove();
        update();
    }

    function update(){
        document.querySelectorAll('.step-number').forEach((x,i)=>x.innerText=i+1);
    }

    function collect(){
        return {
            id:id.value||null,
            summary:summary.value,
            description:description.value,
            precondition:pre.value,
            testType:testType.value,
            component:component.value,
            affectedVersion:affectedVersion.value,
            fixVersion:fixVersion.value,
            labels:labels.value,
            executeIn:executeIn.value,
            steps:[...document.querySelectorAll('#steps tbody tr')]
                .map(r=>{
                    const i=r.querySelectorAll('input');
                    return {
                        action:i[0].value,
                        data:i[1].value,
                        expected:i[2].value
                    };
                }).filter(s=>s.action||s.expected)
        };
    }

    function save(){
        const d=collect();

        fetch('/api/testcases'+(d.id?'/'+d.id:''),{
            method:d.id?'PUT':'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(d)
        })
            .then(()=>{ toast("Saved"); load(); resetForm(); });
    }

    function downloadCsv(){
        fetch('/api/testcases/export')
            .then(r=>{
                if(!r.ok) throw new Error('Export failed');
                return r.blob();
            })
            .then(blob=>{
                const url=window.URL.createObjectURL(blob);
                const link=document.createElement('a');
                link.href=url;
                link.download='testcases.csv';
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                toast("CSV downloaded");
            })
            .catch(()=>toast("CSV export failed"));
    }

    function load(){
        fetch('/api/testcases')
            .then(r=>r.json())
            .then(list=>{
                const c=document.getElementById('list');
                c.innerHTML='';

                list.forEach(tc=>{
                    const div=document.createElement('div');
                    div.className='list-item';
                    div.innerHTML=`
          <span>${tc.summary} (${tc.steps.length})</span>
          <span>
            <button class="secondary" onclick="edit(${tc.id})">Edit</button>
            <button class="danger" onclick="del(${tc.id})">Delete</button>
          </span>`;
                    c.appendChild(div);
                });
            });
    }

    function edit(idVal){
        fetch('/api/testcases')
            .then(r=>r.json())
            .then(list=>{
                const tc=list.find(x=>x.id===idVal);
                id.value=tc.id;
                summary.value=tc.summary;
                description.value=tc.description || '';
                pre.value=tc.precondition;
                testType.value=tc.testType;
                component.value=tc.component;
                affectedVersion.value=tc.affectedVersion || '';
                fixVersion.value=tc.fixVersion || '';
                labels.value=tc.labels || '';
                executeIn.value=tc.executeIn || '';

                document.querySelector('#steps tbody').innerHTML='';
                tc.steps.forEach(s=>addRow(s.action,s.data,s.expected));
            });
    }

    function del(idVal){
        fetch('/api/testcases/'+idVal,{method:'DELETE'})
            .then(()=>{ toast("Deleted"); load(); });
    }

    function resetForm(){
        id.value=''; summary.value=''; description.value=''; pre.value=''; component.value='';
        affectedVersion.value=''; fixVersion.value=''; labels.value=''; executeIn.value='';
        document.querySelector('#steps tbody').innerHTML='';
        addRow();
    }

    /* ================= IMPORT ================= */

    function importCsv(){
        const f=document.getElementById('file').files[0];
        if(!f){ toast("Select file"); return; }

        const fd=new FormData();
        fd.append('file',f);

        fetch('/api/testcases/import',{method:'POST',body:fd})
            .then(r=>r.json())
            .then(res=>{

                // errors
                const err=document.getElementById('errors');
                err.innerHTML='';
                (res.errors||[]).forEach(e=>{
                    const li=document.createElement('li');
                    li.innerText=e;
                    li.className='error';
                    err.appendChild(li);
                });

                // preview
                const prev=document.getElementById('preview');
                prev.innerHTML='';

                window._imported=res.testCases||[];

                window._imported.forEach((tc,i)=>{
                    const div=document.createElement('div');
                    div.className='preview-box';
                    div.innerHTML=`
          <b>${tc.summary}</b>
          <div>${tc.steps.length} steps</div>
          <button class="secondary" onclick="loadPreview(${i})">Load</button>
        `;
                    prev.appendChild(div);
                });

                load();
                toast("Preview ready");
            });
    }

    function loadPreview(i){
        const tc=window._imported[i];

        summary.value=tc.summary;
        description.value=tc.description || '';
        pre.value=tc.precondition;
        component.value=tc.component || '';
        affectedVersion.value=tc.affectedVersion || '';
        fixVersion.value=tc.fixVersion || '';
        labels.value=tc.labels || '';
        executeIn.value=tc.executeIn || '';

        document.querySelector('#steps tbody').innerHTML='';
        tc.steps.forEach(s=>addRow(s.action,s.data,s.expected));

        toast("Loaded preview");
    }

    addRow();
    load();
</script>

</body>
</html>
